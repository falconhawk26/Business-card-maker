<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Business Card Maker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      margin: 0;
      padding: 20px;
      background: #f4f4f7;
      color: #222;
      display: flex;
      justify-content: center;
    }

    .app {
      max-width: 1100px;
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 1fr);
      gap: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 1.8rem;
    }

    .panel {
      background: #ffffff;
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.06);
    }

    .panel h2 {
      margin-top: 0;
      font-size: 1.2rem;
    }

    .form-row {
      margin-bottom: 12px;
    }

    .form-row label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 4px;
      color: #555;
    }

    .form-row input,
    .form-row select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 0.9rem;
    }

    .form-row input:focus,
    .form-row select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 1px #2563eb33;
    }

    .layout-row {
      display: flex;
      gap: 10px;
    }

    .layout-row > div {
      flex: 1;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 9px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, transform 0.05s;
    }

    button.primary {
      background: #2563eb;
      color: #fff;
    }

    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    button:active {
      transform: translateY(0);
      filter: brightness(0.97);
    }

    /* Card preview */
    .preview-wrapper {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }

    .card-container {
      width: 360px;
      height: 200px;
      border-radius: 14px;
      padding: 18px 20px;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: #f9fafb;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .card-name-title {
      max-width: 70%;
    }

    .card-name {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .card-title {
      font-size: 0.85rem;
      color: #d1d5db;
      margin-top: 2px;
    }

    .card-company {
      font-size: 0.8rem;
      margin-top: 6px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9ca3af;
    }

    .card-logo {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 2px solid #f9fafb33;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #e5e7eb;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      font-size: 0.75rem;
      color: #d1d5db;
    }

    .card-contact {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .card-contact span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-contact span::before {
      content: "•";
      font-size: 0.7rem;
      color: #9ca3af;
    }

    .card-website {
      font-size: 0.75rem;
      color: #60a5fa;
    }

    .card-accent {
      position: absolute;
      right: -40px;
      bottom: -40px;
      width: 140px;
      height: 140px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #60a5fa, transparent 60%);
      opacity: 0.45;
      pointer-events: none;
    }

    .hint {
      font-size: 0.8rem;
      color: #6b7280;
      text-align: center;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .card-container {
        width: 100%;
        max-width: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <h1>Business Card Maker</h1>
      <p style="font-size:0.9rem;color:#4b5563;margin-bottom:14px;">
        Fill in your details, tweak the look, and download a clean business card as an image.
      </p>

      <div class="form-row">
        <label for="name">Full name</label>
        <input id="name" type="text" placeholder="Jane Doe" value="Jane Doe" />
      </div>

      <div class="form-row">
        <label for="title">Job title</label>
        <input id="title" type="text" placeholder="Marketing Director" value="Marketing Director" />
      </div>

      <div class="form-row">
        <label for="company">Company</label>
        <input id="company" type="text" placeholder="Brightline Studio" value="Brightline Studio" />
      </div>

      <div class="layout-row">
        <div class="form-row">
          <label for="phone">Phone</label>
          <input id="phone" type="text" placeholder="(555) 123-4567" value="(555) 123-4567" />
        </div>
        <div class="form-row">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="jane@brightline.com" value="jane@brightline.com" />
        </div>
      </div>

      <div class="form-row">
        <label for="website">Website</label>
        <input id="website" type="text" placeholder="brightline.com" value="brightline.com" />
      </div>

      <div class="layout-row">
        <div class="form-row">
          <label for="bgColor">Background color</label>
          <input id="bgColor" type="color" value="#111827" />
        </div>
        <div class="form-row">
          <label for="accentColor">Accent color</label>
          <input id="accentColor" type="color" value="#60a5fa" />
        </div>
      </div>

      <div class="actions">
        <button class="primary" id="downloadBtn">
          ⬇️ Download PNG
        </button>
        <button class="secondary" id="printBtn">
          🖨️ Print
        </button>
      </div>
    </div>

    <div class="panel">
      <h2>Preview</h2>
      <div class="preview-wrapper">
        <div id="card" class="card-container">
          <div class="card-top">
            <div class="card-name-title">
              <div class="card-name" id="cardName">Jane Doe</div>
              <div class="card-title" id="cardTitle">Marketing Director</div>
              <div class="card-company" id="cardCompany">Brightline Studio</div>
            </div>
            <div class="card-logo" id="cardLogo">BS</div>
          </div>
          <div class="card-bottom">
            <div class="card-contact">
              <span id="cardPhone">(555) 123-4567</span>
              <span id="cardEmail">jane@brightline.com</span>
            </div>
            <div class="card-website" id="cardWebsite">brightline.com</div>
          </div>
          <div class="card-accent" id="cardAccent"></div>
        </div>
        <p class="hint">
          Tip: Download the PNG and drop it into a print template or send to a print shop.
        </p>
      </div>
    </div>
  </div>

  <!-- html2canvas CDN -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script>
    const inputs = {
      name: document.getElementById("name"),
      title: document.getElementById("title"),
      company: document.getElementById("company"),
      phone: document.getElementById("phone"),
      email: document.getElementById("email"),
      website: document.getElementById("website"),
      bgColor: document.getElementById("bgColor"),
      accentColor: document.getElementById("accentColor"),
    };

    const card = document.getElementById("card");
    const cardName = document.getElementById("cardName");
    const cardTitle = document.getElementById("cardTitle");
    const cardCompany = document.getElementById("cardCompany");
    const cardLogo = document.getElementById("cardLogo");
    const cardPhone = document.getElementById("cardPhone");
    const cardEmail = document.getElementById("cardEmail");
    const cardWebsite = document.getElementById("cardWebsite");
    const cardAccent = document.getElementById("cardAccent");

    function updateCard() {
      cardName.textContent = inputs.name.value || "Your Name";
      cardTitle.textContent = inputs.title.value || "Your Title";
      cardCompany.textContent = inputs.company.value || "Your Company";

      const initials = (inputs.company.value || inputs.name.value || "Logo")
        .split(" ")
        .filter(Boolean)
        .map(word => word[0].toUpperCase())
        .slice(0, 2)
        .join("");
      cardLogo.textContent = initials || "Logo";

      cardPhone.textContent = inputs.phone.value || "";
      cardEmail.textContent = inputs.email.value || "";
      cardWebsite.textContent = inputs.website.value || "";

      const bg = inputs.bgColor.value || "#111827";
      const accent = inputs.accentColor.value || "#60a5fa";

      card.style.background = `linear-gradient(135deg, ${bg}, #1f2937)`;
      cardAccent.style.background = `radial-gradient(circle at 30% 30%, ${accent}, transparent 60%)`;
      cardWebsite.style.color = accent;
    }

    Object.values(inputs).forEach(input => {
      input.addEventListener("input", updateCard);
    });

    updateCard();

    document.getElementById("downloadBtn").addEventListener("click", async () => {
      const canvas = await html2canvas(card, {
        backgroundColor: null,
        scale: 3,
      });
      const link = document.createElement("a");
      link.download = "business-card.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    });

    document.getElementById("printBtn").addEventListener("click", () => {
      const printWindow = window.open("", "_blank");
      const cardClone = card.cloneNode(true);
      const style = `
        <style>
          body { margin:0; display:flex; justify-content:center; align-items:center; height:100vh; background:#f4f4f7; }
        </style>
      `;
      printWindow.document.write(`
        <html>
          <head><title>Print Business Card</title>${style}</head>
          <body></body>
        </html>
      `);
      printWindow.document.body.appendChild(cardClone);
      printWindow.document.close();
      printWindow.focus();
      setTimeout(() => printWindow.print(), 400);
    });
  </script>
</body>
</html>
